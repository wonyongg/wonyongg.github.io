about_content: | # this will include new lines to allow paragraphs
  대학교에서 처음 프로그래밍을 배워 해당 수업에서 A+ 학점을 받고 교내 코딩 경시 대회에서 2번 입상했습니다.<br>
  문제 해결을 위해 고민하는 시간이 즐거웠고, 정답을 도출해냈을 때는 큰 성취감을 느꼈습니다.<br> 
  이때의 경험이 개발자로 진로를 결정하는데 큰 영향을 주었습니다.
  <br><br>

  기초 CS 지식을 습득하기 위해 <mark>정보처리기사</mark>를 취득하고, 실무 중심의 학습을 위해 <mark>부트캠프</mark>에 참여하였습니다.
  <br><br>

  오버 커뮤니케이션을 지향하고, 지식과 기술을 공유하는 개발자 문화를 동경하고 있습니다.<br>
  프로젝트 과정에서 팀원들과 활발히 소통하여 협동심을 높이고, 프로젝트 내 스터디를 통해 효율적인 학습을 경험했습니다.<br>
  이를 계기로 <strong>팀원들 간에 자주 소통하고 공유하는 개발 문화를 지향</strong>하게 되었습니다.
  <br><br>

content:
  - title: Strength # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        description: |
          * <strong>문제 해결을 위한 끈기와 노력</strong><br>
            -> 알고리즘 문제를 풀 때 고민을 즐김. 단기간 준비에도 교내 코딩 경시 대회에서 입상할 정도로 집중력을 발휘함.
          <br><br>
          * <strong>주어진 역할에 최선을 다하는 책임감</strong><br>
            -> 프로젝트에서 처음 접하는 로그인/로그아웃 구현, 캐시 서버 적용을 맡아 이해가 완벽히 되지 않은 상태에서도 성공적으로 수행.
          <br><br>
          * <strong>항상 타인을 생각하는 이타심</strong><br>
            -> 여러 번의 페어 프로그래밍 경험에서 어려워하는 동기들을 상담해주거나, 아는 내용을 친절하게 설명하여 좋은 리뷰를 다수 받음.
          <br><br>

  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: 에코그린서울
        icon: fab fa-github
        link: https://github.com/wonyongg/seb41_main_027
        caption: 2023.01 - 2023.02
#         link_text: Project Website
#        additional_links:
#          - title:  sproogen/modern-resume-theme
#            icon: fab fa-github
#            url: https://github.com/wonyongg/seb41_main_027
          # - title:  Github page for project (eg. sproogen/modern-resume-theme)
          #   icon: fab fa-github
          #   url: Link to project (eg. sproogen.github.io/modern-resume-theme)
        quote: >
          친환경 관련 장소 공유 플랫폼
        description: | # this will include new lines to allow paragraphs
          - <strong>AWS 아키텍처 설계</strong><br>
            -> VPC, 서브넷을 기반으로 AWS 리소스를 어떻게 배치할지에 대해 고려하여 설계
          <br><br>
          - <strong>CI/CD 파이프라인 설계 및 구현</strong><br>
            -> Github Actions를 통해 배포 자동화 구현하고 배포 시간을 단축
          <br><br>
          - <strong>Spring MVC 기반의 CRUD 기능을 수행하는 서버 구현</strong>
          <br><br>
          - <strong>유지보수의 효율성을 높히기 위한 로그의 시각화</strong><br>
            -> Spring AOP, AWS CloudWatch와 Grafana를 이용한 실시간 로깅 및 트래킹 구현, 각 API 요청 시 단계별 소요 시간 파악 가능
          <br><br>
          - <strong>성능 최적화</strong><br>
            -> 구현한 APM를 통해 슬로우쿼리를 찾아보고, N+1 식별 및 최적화<br>
            -> DB 트래픽을 낮추기 위해 Redis 캐시 서버 적용
          <br><br>
          - <strong>코드 품질 향상에 대한 노력</strong><br>
            -> 팀원 간의 코드 스타일을 병합하고, 프로젝트의 의미있는 테스트 커버리지들을 높히기 위해 Sonarqube 도입
          <br><br>

          프로젝트 관련 블로깅 링크 : [https://github.com/wonyongg/seb41_main_027_blogging](https://github.com/wonyongg/seb41_main_027_blogging)
          <br><br>

